# Include these top-level locations inside the HTTPS `server` block of `/etc/nginx/sites-enabled/paperclip`.
# Do not nest them inside `location /`.

location = /yalru-agent-cli/panel.js {
    alias /srv/paperclip-data/multiagent-uiux-factory/agent-dashboard-cli/agent-dashboard-cli.js;
    default_type application/javascript;
    add_header Cache-Control "no-store" always;
}

location /yalru-agent-cli/ {
    proxy_pass http://127.0.0.1:4192/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Yalru-Internal-Proxy "1";
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}

# BEGIN YALRU TERMINAL ROUTES
# Real terminal panes; each ttyd instance owns one agent base path.
location /yalru-terminal/hermes/ {
    allow 127.0.0.1;
    allow ::1;
    deny all;
    proxy_pass http://127.0.0.1:4290;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}

